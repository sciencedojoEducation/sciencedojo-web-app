<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScienceDojo Live Classroom</title>
    <!-- Zoom Bootstrap CSS -->
    <link rel="stylesheet" href="https://source.zoom.us/3.11.0/css/bootstrap.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #020617; /* slate-950 */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #zmmtg-root {
            width: 100%;
            height: 100%;
            display: none;
        }
        #loading-state {
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(59, 130, 246, 0.1);
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading-state">
        <div class="spinner"></div>
        <div style="font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; font-size: 12px;">Syncing with Dojo</div>
    </div>
    <div id="zmmtg-root"></div>

    <!-- Core Dependencies (Direct UNPKG UMD - Unwrapped and Ready) -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/redux@4.2.1/dist/redux.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/redux-thunk@2.4.2/dist/redux-thunk.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/lodash@4.17.21/lodash.min.js" crossorigin="anonymous"></script>

    <!-- Zoom Embedded SDK Engine (Synced via ScienceDojo Proxy for Security Alignment) -->
    <script src="/api/zoom-proxy/zoom-meeting-embedded-3.11.0.min.js" crossorigin="anonymous"></script>

    <script>
        console.log("[Isolated Classroom] Booting engine...");

        // Safety Net: Catch and report ANY global error back to ScienceDojo
        window.onerror = function(message, source, lineno, colno, error) {
            console.error("[Isolated Classroom] Global Sandbox Error:", message);
            
            // Log global state for debugging
            console.log("[Isolated Classroom] Global State Check:", {
                React: !!window.React,
                ReactDOM: !!window.ReactDOM,
                Redux: !!window.Redux,
                ReduxThunk: typeof window.ReduxThunk,
                ZoomMtgEmbedded: !!window.ZoomMtgEmbedded
            });

            window.parent.postMessage({ 
                type: 'MEETING_ERROR', 
                payload: message || "Global sandbox error" 
            }, '*');
        };

        window.addEventListener('message', async (event) => {
            const data = event.data;
            if (data.type === 'START_MEETING') {
                console.log("[Isolated Classroom] Start signal received.");
                const { meetingNumber, passWord, userName, userEmail, signature, sdkKey } = data.payload;
                
                try {
                    const client = ZoomMtgEmbedded.createClient();
                    const meetingRoot = document.getElementById('zmmtg-root');
                    meetingRoot.style.display = 'block';
                    document.getElementById('loading-state').style.display = 'none';

                    await client.init({
                        zoomAppRoot: meetingRoot,
                        language: "en-US",
                        patchJsMedia: true,
                        assetPath: "/api/zoom-proxy/3.11.0/lib/"
                    });

                    console.log("[Isolated Classroom] Engine initialized. Joining room...");

                    await client.join({
                        signature: signature,
                        sdkKey: sdkKey,
                        meetingNumber: meetingNumber,
                        password: passWord,
                        userName: userName,
                        userEmail: userEmail,
                    });

                    console.log("[Isolated Classroom] Success! Meeting joined.");
                    window.parent.postMessage({ type: 'MEETING_JOINED' }, '*');
                } catch (error) {
                    console.error("[Isolated Classroom] Critical Fail:", error);
                    window.parent.postMessage({ 
                        type: 'MEETING_ERROR', 
                        payload: error.message || "Failed to join live class" 
                    }, '*');
                }
            }
        });

        // Tell parent we're ready
        window.parent.postMessage({ type: 'IFRAME_READY' }, '*');
    </script>
</body>
</html>
