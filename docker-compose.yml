services:
  sciencedojo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sciencedojo-web
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.local

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sciencedojo-cloudflared
    restart: unless-stopped
    depends_on:
      - sciencedojo
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN:?Set CLOUDFLARED_TOKEN in your Docker Compose .env file}
